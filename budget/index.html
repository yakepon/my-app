<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>家計簿</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Noto+Sans+JP:wght@400;500;700;900&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="ledger-lines" aria-hidden="true"></div>

  <header class="app-header">
    <p class="kicker">HOUSEHOLD LEDGER</p>
    <h1 class="logo">家計簿</h1>
  </header>

  <main>
    <section class="stats">
      <div class="stat-card stat-budget">
        <span class="stat-label">今月の予算</span>
        <span class="stat-value" id="statBudget">--</span>
      </div>
      <div class="stat-card stat-expense">
        <span class="stat-label">今月の支出</span>
        <span class="stat-value" id="statExpense">--</span>
      </div>
      <div class="stat-card stat-balance">
        <span class="stat-label">今月の差引</span>
        <span class="stat-value" id="statBalance">--</span>
        <span class="hanko" id="hankoStamp">黒</span>
      </div>
    </section>

    <section class="panel settings" id="settings" hidden>
      <h2>接続設定</h2>
      <p class="hint">
        Googleスプレッドシートと連携する Google Apps Script Webアプリの URL を入力してください。
        設定方法は <code>gas/Code.gs</code> と同梱の README を参照してください。
      </p>
      <div class="field-row">
        <input type="url" id="gasUrl" placeholder="https://script.google.com/macros/s/.../exec">
        <button id="saveUrl" class="btn">保存</button>
      </div>
      <p class="status" id="connStatus">未接続</p>
    </section>

    <section class="panel summary-panel">
      <div class="summary-head">
        <h2>月次集計</h2>
        <input type="month" id="summaryMonth">
      </div>
      <div class="summary-totals">
        <div class="summary-total-item">
          <span class="summary-total-label">収入合計</span>
          <span class="summary-total-value ink-income" id="summaryIncome">--</span>
        </div>
        <div class="summary-total-item">
          <span class="summary-total-label">支出合計</span>
          <span class="summary-total-value ink-expense" id="summaryExpense">--</span>
        </div>
        <div class="summary-total-item">
          <span class="summary-total-label">差引</span>
          <span class="summary-total-value" id="summaryBalance">--</span>
        </div>
      </div>
      <div class="breakdown-cols">
        <div class="breakdown-col">
          <h3>支出の内訳</h3>
          <div class="breakdown-list" id="expenseBreakdown"><p class="empty">記録がありません。</p></div>
        </div>
        <div class="breakdown-col">
          <h3>収入の内訳</h3>
          <div class="breakdown-list" id="incomeBreakdown"><p class="empty">記録がありません。</p></div>
        </div>
      </div>
    </section>

    <section class="panel budget-panel">
      <h2>予算</h2>
      <div class="budget-list" id="budgetList"></div>
    </section>

    <section class="panel form-panel">
      <h2 id="formTitle">記帳する</h2>
      <form id="recordForm">
        <input type="hidden" name="id">
        <div class="type-toggle">
          <label class="type-opt type-opt-expense">
            <input type="radio" name="type" value="expense" checked>
            <span class="type-label">支出</span>
          </label>
          <label class="type-opt type-opt-income">
            <input type="radio" name="type" value="income">
            <span class="type-label">収入</span>
          </label>
        </div>
        <div class="form-grid">
          <label>日付
            <input type="date" name="date" required>
          </label>
          <label>金額
            <input type="number" name="amount" min="0" step="1" placeholder="例: 1200" required>
          </label>
          <label class="category-field" id="expenseCategoryField">カテゴリ（大）
            <select name="expenseCategory" id="expenseCategorySelect">
              <option value="車">車</option>
              <option value="遊び">遊び</option>
              <option value="外食">外食</option>
              <option value="美容">美容</option>
              <option value="その他">その他</option>
            </select>
          </label>
          <label class="category-field" id="subCategoryField">カテゴリ（中）
            <input type="text" name="subCategory" list="subCategoryList" id="subCategoryInput" placeholder="例: ガソリン代">
          </label>
          <label class="category-field" id="incomeCategoryField" hidden>カテゴリ
            <input type="text" name="incomeCategory" list="incomeCategoryList" id="incomeCategoryInput" placeholder="例: 給与">
          </label>
        </div>
        <label class="memo-field">メモ
          <textarea name="memo" rows="2" placeholder="購入先やメモ"></textarea>
        </label>
        <datalist id="subCategoryList"></datalist>
        <datalist id="incomeCategoryList"></datalist>
        <div class="form-actions">
          <button type="submit" class="btn btn-primary" id="submitBtn">記帳する</button>
          <button type="button" class="btn" id="cancelEdit" hidden>キャンセル</button>
        </div>
      </form>
    </section>

    <section class="panel records-panel">
      <h2>記録</h2>
      <div class="records-list" id="recordsList">
        <p class="empty">接続設定を行うと記録が表示されます。</p>
      </div>
    </section>
  </main>

  <footer class="footer">
    <p>家計簿 — powered by Google Sheets</p>
    <button id="toggleSettings" class="settings-toggle">⚙ 接続設定</button>
  </footer>

  <script src="app.js"></script>
</body>
</html>
